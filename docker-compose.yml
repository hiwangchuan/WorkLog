services:
  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-worklog}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: worklog
      POSTGRES_USER: worklog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worklog-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worklog -d worklog"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-worklog}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ${CONTAINER_PREFIX:-worklog}-backend
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://worklog:worklog-password@postgres:5432/worklog}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: /app/uploads
      EXPORT_DIR: /app/exports
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/exports:/app/exports
      - ./data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: ${CONTAINER_PREFIX:-worklog}-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-worklog}-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
